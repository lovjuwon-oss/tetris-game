<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 키즈 테트리스!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Jua&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --cloud: #ffffff;
    --grass: #5DBB63;
    --yellow: #FFD700;
    --pink: #FF69B4;
    --orange: #FF8C00;
    --purple: #9B59B6;
    --red: #FF4757;
    --teal: #00CEC9;
    --blue: #3498DB;
    --lime: #A3CB38;
    --bg: #E8F4FD;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', 'Jua', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
    padding: 10px 0 20px;
    position: relative;
  }

  /* 구름 배경 */
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.7;
    animation: floatCloud linear infinite;
    z-index: 0;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width:120px; height:40px; top:5%; animation-duration:25s; animation-delay:-5s; left:-150px; }
  .cloud-1::before { width:60px; height:60px; top:-30px; left:15px; }
  .cloud-1::after  { width:45px; height:45px; top:-20px; left:50px; }

  .cloud-2 { width:90px; height:30px; top:15%; animation-duration:30s; animation-delay:-12s; left:-120px; }
  .cloud-2::before { width:45px; height:45px; top:-22px; left:10px; }
  .cloud-2::after  { width:35px; height:35px; top:-15px; left:40px; }

  .cloud-3 { width:150px; height:50px; top:25%; animation-duration:20s; animation-delay:-8s; left:-180px; }
  .cloud-3::before { width:70px; height:70px; top:-35px; left:20px; }
  .cloud-3::after  { width:55px; height:55px; top:-25px; left:65px; }

  @keyframes floatCloud {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 200px)); }
  }

  /* 떠다니는 별 */
  .star {
    position: fixed;
    font-size: 24px;
    animation: twinkle 2s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }
  @keyframes twinkle {
    0%,100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
    50% { transform: scale(1.3) rotate(20deg); opacity: 1; }
  }

  /* 제목 */
  .title-wrap {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-bottom: 12px;
    animation: titleBounce 1s ease-out;
  }
  @keyframes titleBounce {
    0% { transform: translateY(-60px); opacity: 0; }
    60% { transform: translateY(10px); }
    100% { transform: translateY(0); opacity: 1; }
  }
  .title-wrap h1 {
    font-family: 'Jua', sans-serif;
    font-size: 2.8rem;
    color: white;
    text-shadow:
      3px 3px 0 #FF69B4,
      6px 6px 0 #FF8C00,
      -2px -2px 0 #3498DB;
    letter-spacing: 2px;
    line-height: 1;
  }
  .title-sub {
    font-size: 1rem;
    color: #7f8c8d;
    font-weight: 700;
    margin-top: 4px;
  }

  /* 메인 레이아웃 */
  .game-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  /* 사이드 패널 */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 130px;
  }

  .panel-card {
    background: white;
    border-radius: 20px;
    padding: 14px 12px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1), 0 0 0 3px rgba(255,105,180,0.2);
    position: relative;
    overflow: hidden;
  }
  .panel-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--pink), var(--yellow), var(--teal));
    border-radius: 20px 20px 0 0;
  }

  .panel-label {
    font-size: 0.7rem;
    font-weight: 800;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .panel-value {
    font-family: 'Jua', sans-serif;
    font-size: 1.8rem;
    color: #2d3436;
    line-height: 1;
  }
  .panel-emoji {
    font-size: 1.5rem;
    margin-bottom: 4px;
    display: block;
  }

  /* 다음 블록 */
  #next-canvas {
    display: block;
    margin: 0 auto;
    border-radius: 8px;
  }

  /* 게임 캔버스 영역 */
  .canvas-wrap {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 10px 40px rgba(0,0,0,0.15),
      0 0 0 4px white,
      0 0 0 7px #FF69B4;
  }
  #game-canvas {
    display: block;
    border-radius: 20px;
  }

  /* 오버레이 (시작/게임오버/일시정지) */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    z-index: 20;
    backdrop-filter: blur(4px);
    background: rgba(255,255,255,0.85);
    transition: opacity 0.3s;
  }
  .overlay.hidden { display: none; }

  .overlay-emoji {
    font-size: 4rem;
    animation: overlayBounce 0.6s ease-in-out infinite alternate;
    margin-bottom: 8px;
  }
  @keyframes overlayBounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-12px); }
  }

  .overlay h2 {
    font-family: 'Jua', sans-serif;
    font-size: 1.8rem;
    color: #2d3436;
    margin-bottom: 6px;
    text-align: center;
  }
  .overlay p {
    font-size: 0.85rem;
    color: #636e72;
    margin-bottom: 16px;
    text-align: center;
    line-height: 1.5;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    margin: 4px;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }

  .btn-primary { background: linear-gradient(135deg, #FF69B4, #FF8C00); color: white; }
  .btn-primary:hover { background: linear-gradient(135deg, #ff55aa, #e67e00); }
  .btn-secondary { background: linear-gradient(135deg, #3498DB, #9B59B6); color: white; }
  .btn-secondary:hover { filter: brightness(1.1); }

  /* 조작 버튼 */
  .controls {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(2, 52px);
    gap: 6px;
    justify-content: center;
  }
  .ctrl-btn {
    width: 52px; height: 52px;
    border-radius: 14px;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    transition: all 0.1s;
    font-weight: 900;
    background: white;
    color: #2d3436;
    user-select: none;
  }
  .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  #btn-up    { grid-column: 2; grid-row: 1; background: linear-gradient(135deg, #FFD700, #FF8C00); }
  #btn-left  { grid-column: 1; grid-row: 2; background: linear-gradient(135deg, #3498DB, #00CEC9); color:white; }
  #btn-down  { grid-column: 2; grid-row: 2; background: linear-gradient(135deg, #FF69B4, #9B59B6); color:white; }
  #btn-right { grid-column: 3; grid-row: 2; background: linear-gradient(135deg, #A3CB38, #00CEC9); color:white; }

  /* 레벨 바 */
  .level-bar-wrap {
    background: #f0f0f0;
    border-radius: 10px;
    height: 8px;
    margin-top: 6px;
    overflow: hidden;
  }
  .level-bar {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #FF69B4, #FFD700, #3498DB);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* 콤보 팝업 */
  #combo-popup {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    font-family: 'Jua', sans-serif;
    font-size: 2.5rem;
    color: white;
    text-shadow: 2px 2px 0 #FF8C00, -2px -2px 0 #FF69B4;
    z-index: 100;
    pointer-events: none;
    transition: transform 0.2s, opacity 0.4s;
    opacity: 0;
    white-space: nowrap;
  }
  #combo-popup.show {
    transform: translateX(-50%) scale(1);
    opacity: 1;
  }

  /* 반응형 */
  @media (max-width: 500px) {
    .title-wrap h1 { font-size: 2rem; }
    .game-wrapper { flex-direction: column; align-items: center; gap: 10px; }
    .side-panel { flex-direction: row; width: auto; flex-wrap: wrap; justify-content: center; }
    .panel-card { width: 100px; }
  }
</style>
</head>
<body>

<!-- 배경 클라우드 -->
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<!-- 별 -->
<div class="star" style="top:8%;left:5%;animation-delay:0s">⭐</div>
<div class="star" style="top:12%;right:6%;animation-delay:0.5s">🌟</div>
<div class="star" style="top:3%;left:40%;animation-delay:1s">✨</div>
<div class="star" style="top:18%;left:15%;animation-delay:1.5s">⭐</div>
<div class="star" style="top:6%;right:25%;animation-delay:0.8s">🌟</div>

<!-- 제목 -->
<div class="title-wrap">
  <h1>🌈 키즈 테트리스!</h1>
  <div class="title-sub">블록을 쌓아요! 줄을 완성하면 점수 UP! 🎉</div>
</div>

<!-- 게임 영역 -->
<div class="game-wrapper">
  <!-- 왼쪽 패널 -->
  <div class="side-panel">
    <div class="panel-card">
      <span class="panel-emoji">🏆</span>
      <div class="panel-label">점수</div>
      <div class="panel-value" id="score-display">0</div>
    </div>
    <div class="panel-card">
      <span class="panel-emoji">🎯</span>
      <div class="panel-label">레벨</div>
      <div class="panel-value" id="level-display">1</div>
      <div class="level-bar-wrap">
        <div class="level-bar" id="level-bar"></div>
      </div>
    </div>
    <div class="panel-card">
      <span class="panel-emoji">💎</span>
      <div class="panel-label">줄 수</div>
      <div class="panel-value" id="lines-display">0</div>
    </div>
    <div class="panel-card">
      <span class="panel-emoji">⏸️</span>
      <button class="btn btn-secondary" id="pause-btn" style="width:100%;font-size:0.8rem;padding:8px;">일시정지</button>
    </div>
  </div>

  <!-- 게임 캔버스 -->
  <div>
    <div class="canvas-wrap">
      <canvas id="game-canvas" width="240" height="480"></canvas>
      <!-- 시작 오버레이 -->
      <div class="overlay" id="start-overlay">
        <div class="overlay-emoji">🎮</div>
        <h2>키즈 테트리스!</h2>
        <p>블록을 쌓아서 가로줄을<br>완성하면 점수를 얻어요!</p>
        <button class="btn btn-primary" id="start-btn">▶ 게임 시작!</button>
      </div>
      <!-- 일시정지 오버레이 -->
      <div class="overlay hidden" id="pause-overlay">
        <div class="overlay-emoji">☕</div>
        <h2>잠깐 쉬어요!</h2>
        <p>게임이 멈췄어요</p>
        <button class="btn btn-primary" id="resume-btn">▶ 계속하기</button>
      </div>
      <!-- 게임오버 오버레이 -->
      <div class="overlay hidden" id="gameover-overlay">
        <div class="overlay-emoji">😢</div>
        <h2>게임 오버!</h2>
        <p id="gameover-score">점수: 0</p>
        <button class="btn btn-primary" id="restart-btn">🔄 다시 시작!</button>
      </div>
    </div>

    <!-- 다음 블록 -->
    <div style="margin-top:10px; display:flex; align-items:center; gap:10px; justify-content:center;">
      <div class="panel-card" style="display:flex;align-items:center;gap:10px;padding:10px 16px;">
        <span style="font-size:0.75rem;font-weight:800;color:#aaa;">다음 블록</span>
        <canvas id="next-canvas" width="80" height="80"></canvas>
      </div>
    </div>

    <!-- 조작 버튼 (모바일) -->
    <div class="controls">
      <button class="ctrl-btn" id="btn-up">🔄</button>
      <button class="ctrl-btn" id="btn-left">◀</button>
      <button class="ctrl-btn" id="btn-down">▼</button>
      <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
    <div style="text-align:center;font-size:0.7rem;color:#aaa;margin-top:6px;">
      키보드: ← → 이동 &nbsp;|&nbsp; ↑ 회전 &nbsp;|&nbsp; ↓ 빠르게
    </div>
  </div>
</div>

<!-- 콤보 팝업 -->
<div id="combo-popup">🎉 완성!</div>

<script>
// ─── 상수 & 설정 ────────────────────────────────────────────────
const COLS = 12, ROWS = 24;
const BLOCK = 20;

// 어린이를 위한 밝은 색상 팔레트
const COLORS = [
  null,
  '#FF4757', // I - 빨강
  '#FF8C00', // O - 주황
  '#FFD700', // T - 노랑
  '#5DBB63', // S - 초록
  '#3498DB', // Z - 파랑
  '#9B59B6', // J - 보라
  '#FF69B4', // L - 핑크
];

const SHAPES = [
  null,
  [[1,1,1,1]],                      // I
  [[2,2],[2,2]],                     // O
  [[0,3,0],[3,3,3]],                 // T
  [[0,4,4],[4,4,0]],                 // S
  [[5,5,0],[0,5,5]],                 // Z
  [[6,0,0],[6,6,6]],                 // J
  [[0,0,7],[7,7,7]],                 // L
];

const EMOJIS = ['⭐','🎉','🌈','💥','🔥','✨','🎊','🌟'];

// ─── 게임 상태 ───────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');

let board, piece, nextPiece, score, lines, level, gameLoop, paused, gameOver, started;
let dropInterval = 800;
let lastTime = 0;
let dropCounter = 0;
let particles = [];
let lineFlash = [];

// ─── 초기화 ─────────────────────────────────────────────────────
function init() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  score = 0; lines = 0; level = 1;
  paused = false; gameOver = false;
  dropInterval = 800;
  particles = []; lineFlash = [];
  updateUI();
  nextPiece = randomPiece();
  spawnPiece();
}

function randomPiece() {
  const type = Math.floor(Math.random() * 7) + 1;
  const shape = SHAPES[type].map(r => [...r]);
  return { type, shape, x: Math.floor(COLS/2) - Math.floor(shape[0].length/2), y: 0 };
}

function spawnPiece() {
  piece = { ...nextPiece, x: Math.floor(COLS/2) - Math.floor(nextPiece.shape[0].length/2), y: 0 };
  nextPiece = randomPiece();
  drawNext();
  if (collide()) { endGame(); }
}

// ─── 충돌 감지 ──────────────────────────────────────────────────
function collide(p = piece, b = board) {
  for (let r = 0; r < p.shape.length; r++)
    for (let c = 0; c < p.shape[r].length; c++)
      if (p.shape[r][c]) {
        const nx = p.x + c, ny = p.y + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && b[ny][nx]) return true;
      }
  return false;
}

// ─── 이동 & 회전 ────────────────────────────────────────────────
function move(dx) {
  piece.x += dx;
  if (collide()) piece.x -= dx;
}

function rotate() {
  const rows = piece.shape.length, cols = piece.shape[0].length;
  const rotated = Array.from({length: cols}, (_,c) =>
    Array.from({length: rows}, (_,r) => piece.shape[rows - 1 - r][c])
  );
  const prev = piece.shape;
  piece.shape = rotated;
  // 벽 킥
  let kick = 0;
  while (collide()) {
    piece.x += (kick % 2 === 0 ? 1 : -1) * Math.ceil(kick/2);
    kick++;
    if (kick > 4) { piece.shape = prev; piece.x = Math.round((COLS - prev[0].length)/2); return; }
  }
}

function drop() {
  piece.y++;
  if (collide()) {
    piece.y--;
    lock();
  }
  dropCounter = 0;
}

function hardDrop() {
  while (!collide()) piece.y++;
  piece.y--;
  lock();
  dropCounter = 0;
}

// ─── 블록 고정 & 줄 제거 ────────────────────────────────────────
function lock() {
  piece.shape.forEach((row, r) =>
    row.forEach((val, c) => {
      if (val && piece.y + r >= 0)
        board[piece.y + r][piece.x + c] = val;
    })
  );
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  const toClear = [];
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(v => v !== 0)) { toClear.push(r); cleared++; }
  }
  if (cleared === 0) return;

  // 줄 제거 애니메이션
  toClear.forEach(r => lineFlash.push({ row: r, alpha: 1 }));

  setTimeout(() => {
    toClear.sort((a,b) => b - a).forEach(r => {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
    });
    lineFlash = [];
  }, 250);

  // 점수
  const pts = [0,100,300,600,1000][Math.min(cleared,4)] * level;
  score += pts;
  lines += cleared;
  const newLevel = Math.floor(lines / 10) + 1;
  if (newLevel > level) {
    level = newLevel;
    dropInterval = Math.max(100, 800 - (level - 1) * 70);
  }

  // 파티클
  toClear.forEach(r => spawnParticles(r));
  showCombo(cleared);
  updateUI();
}

// ─── 파티클 ─────────────────────────────────────────────────────
function spawnParticles(row) {
  for (let i = 0; i < 18; i++) {
    const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    particles.push({
      x: Math.random() * canvas.width,
      y: row * BLOCK + BLOCK/2,
      vx: (Math.random()-0.5) * 5,
      vy: (Math.random()-0.8) * 5,
      life: 1,
      emoji,
      size: 14 + Math.random() * 10
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
  });
}

// ─── 콤보 팝업 ──────────────────────────────────────────────────
function showCombo(cleared) {
  const msgs = ['', '굿! 👍', '훌륭해! 🎉', '대단해! 🌟', '완벽해! 🔥'];
  const el = document.getElementById('combo-popup');
  el.textContent = msgs[Math.min(cleared, 4)];
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

// ─── UI 업데이트 ────────────────────────────────────────────────
function updateUI() {
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('level-display').textContent = level;
  document.getElementById('lines-display').textContent = lines;
  const pct = (lines % 10) / 10 * 100;
  document.getElementById('level-bar').style.width = pct + '%';
}

// ─── 그리기 ─────────────────────────────────────────────────────
function drawBlock(context, x, y, color, alpha = 1) {
  const s = BLOCK - 2;
  const px = x * BLOCK + 1, py = y * BLOCK + 1;
  context.globalAlpha = alpha;

  // 메인 색상
  context.fillStyle = color;
  context.beginPath();
  context.roundRect(px, py, s, s, 4);
  context.fill();

  // 하이라이트 (윗면)
  context.fillStyle = 'rgba(255,255,255,0.4)';
  context.beginPath();
  context.roundRect(px + 2, py + 2, s - 4, (s-4)/3, 3);
  context.fill();

  // 그림자 (아랫면)
  context.fillStyle = 'rgba(0,0,0,0.15)';
  context.beginPath();
  context.roundRect(px + 2, py + s - 5, s - 4, 4, 2);
  context.fill();

  context.globalAlpha = 1;
}

function drawBoard() {
  // 배경 격자
  ctx.fillStyle = '#F0F8FF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // 격자선
      ctx.strokeStyle = 'rgba(200,220,255,0.5)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);

      if (board[r][c]) {
        drawBlock(ctx, c, r, COLORS[board[r][c]]);
      }
    }
  }

  // 줄 제거 플래시
  lineFlash.forEach(f => {
    ctx.fillStyle = `rgba(255,255,255,${f.alpha * 0.8})`;
    ctx.fillRect(0, f.row * BLOCK, canvas.width, BLOCK);
  });
}

function drawGhost() {
  if (!piece) return;
  const ghost = { ...piece, shape: piece.shape.map(r => [...r]) };
  while (!collide(ghost)) ghost.y++;
  ghost.y--;
  ghost.shape.forEach((row, r) =>
    row.forEach((val, c) => {
      if (val) drawBlock(ctx, ghost.x + c, ghost.y + r, COLORS[val], 0.2);
    })
  );
}

function drawPiece() {
  if (!piece) return;
  piece.shape.forEach((row, r) =>
    row.forEach((val, c) => {
      if (val) drawBlock(ctx, piece.x + c, piece.y + r, COLORS[val]);
    })
  );
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.font = `${p.size}px serif`;
    ctx.fillText(p.emoji, p.x, p.y);
    ctx.globalAlpha = 1;
  });
}

function drawNext() {
  nctx.fillStyle = '#F0F8FF';
  nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;
  const offsetX = Math.floor((4 - nextPiece.shape[0].length) / 2);
  const offsetY = Math.floor((4 - nextPiece.shape.length) / 2);
  nextPiece.shape.forEach((row, r) =>
    row.forEach((val, c) => {
      if (val) drawBlock(nctx, offsetX + c, offsetY + r, COLORS[val]);
    })
  );
}

// ─── 게임 루프 ──────────────────────────────────────────────────
function gameFrame(time = 0) {
  if (!started || paused || gameOver) return;
  const delta = time - lastTime;
  lastTime = time;
  dropCounter += delta;
  if (dropCounter >= dropInterval) drop();
  updateParticles();
  drawBoard();
  drawGhost();
  drawPiece();
  drawParticles();
  gameLoop = requestAnimationFrame(gameFrame);
}

// ─── 게임 시작/종료 ─────────────────────────────────────────────
function startGame() {
  init();
  started = true;
  hide('start-overlay'); hide('gameover-overlay');
  lastTime = 0; dropCounter = 0;
  gameLoop = requestAnimationFrame(gameFrame);
}

function endGame() {
  gameOver = true;
  cancelAnimationFrame(gameLoop);
  show('gameover-overlay');
  document.getElementById('gameover-score').textContent = `최종 점수: ${score.toLocaleString()} 점 🎊`;
}

function togglePause() {
  if (gameOver || !started) return;
  paused = !paused;
  if (paused) {
    show('pause-overlay');
    document.getElementById('pause-btn').textContent = '▶ 계속';
    cancelAnimationFrame(gameLoop);
  } else {
    hide('pause-overlay');
    document.getElementById('pause-btn').textContent = '⏸ 일시정지';
    lastTime = performance.now();
    gameLoop = requestAnimationFrame(gameFrame);
  }
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// ─── 이벤트 연결 ────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
document.getElementById('resume-btn').addEventListener('click', togglePause);
document.getElementById('pause-btn').addEventListener('click', togglePause);

document.addEventListener('keydown', e => {
  if (!started || gameOver || paused) return;
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); move(-1); break;
    case 'ArrowRight': e.preventDefault(); move(1);  break;
    case 'ArrowDown':  e.preventDefault(); drop();   break;
    case 'ArrowUp':    e.preventDefault(); rotate(); break;
    case ' ':          e.preventDefault(); hardDrop(); break;
    case 'p': case 'P': togglePause(); break;
  }
});

// 모바일 버튼
document.getElementById('btn-left').addEventListener('click',  () => { if(!paused && !gameOver) move(-1); });
document.getElementById('btn-right').addEventListener('click', () => { if(!paused && !gameOver) move(1); });
document.getElementById('btn-down').addEventListener('click',  () => { if(!paused && !gameOver) drop(); });
document.getElementById('btn-up').addEventListener('click',    () => { if(!paused && !gameOver) rotate(); });

// 터치 스와이프
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (gameOver || paused || !started) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > 20) dx > 0 ? move(1) : move(-1);
  } else {
    if (dy > 20) drop();
    else if (dy < -20) rotate();
  }
  e.preventDefault();
}, { passive: false });

// 초기 캔버스 배경 그리기
ctx.fillStyle = '#F0F8FF';
ctx.fillRect(0, 0, canvas.width, canvas.height);
for (let r = 0; r < ROWS; r++)
  for (let c = 0; c < COLS; c++) {
    ctx.strokeStyle = 'rgba(200,220,255,0.5)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);
  }
</script>
